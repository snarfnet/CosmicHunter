name: CosmicHunter
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: 83VGKGSQUH
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
    GENERATE_INFOPLIST_FILE: NO
targets:
  CosmicHunter:
    type: application
    platform: iOS
    sources:
      - CosmicHunter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.CosmicHunter
        INFOPLIST_FILE: CosmicHunter/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
